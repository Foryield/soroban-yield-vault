<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>For Yield — Stellar testnet demo</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
    background: #0e1420; color: #e8ecf4;
    min-height: 100vh; display: grid; place-items: center; padding: 2rem;
  }
  main { width: 100%; max-width: 26rem; }
  h1 { font-size: 1.6rem; letter-spacing: .02em; }
  .subtitle { color: #8b98ad; margin: .3rem 0 1.8rem; font-size: .95rem; }
  .card {
    background: #161e2e; border: 1px solid #26324a; border-radius: 12px;
    padding: 1.5rem; margin-bottom: 1rem;
  }
  label { display: block; font-size: .85rem; color: #8b98ad; margin-bottom: .4rem; }
  input {
    width: 100%; padding: .7rem .9rem; border-radius: 8px; font-size: 1rem;
    border: 1px solid #26324a; background: #0e1420; color: #e8ecf4;
  }
  button {
    width: 100%; margin-top: 1rem; padding: .75rem; border: 0; border-radius: 8px;
    background: #f2c14e; color: #14181f; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: wait; }
  .mono { font-family: ui-monospace, Menlo, monospace; font-size: .8rem; word-break: break-all; color: #b9c4d6; }
  .field { margin-top: .9rem; }
  .badge { display: inline-block; padding: .2rem .6rem; border-radius: 999px; font-size: .8rem; font-weight: 600; }
  .badge.ok { background: #123726; color: #4ade80; }
  .badge.ko { background: #3a1520; color: #f87171; }
  a { color: #f2c14e; }
  .error { color: #f87171; font-size: .85rem; margin-top: .8rem; min-height: 1.2em; }
  .hidden { display: none; }
</style>
</head>
<body>
<main>
  <h1>For Yield</h1>
  <p class="subtitle">Stellar testnet demo — deposit into the yield vault</p>

  <section id="step-email" class="card">
    <label for="email">Your email</label>
    <input id="email" type="email" placeholder="you@example.com" autocomplete="off">
    <button id="btn-onboard">Create my wallet</button>
    <p id="error-onboard" class="error"></p>
  </section>

  <section id="step-wallet" class="card hidden">
    <span class="badge ok">Wallet created</span>
    <div class="field"><label>Stellar address</label><p id="wallet-address" class="mono"></p></div>
    <button id="btn-deposit">Deposit 0.1 XLM</button>
    <p id="error-deposit" class="error"></p>
  </section>

  <section id="step-result" class="card hidden">
    <span id="result-badge" class="badge"></span>
    <div class="field"><label>Transaction</label><p class="mono"><a id="result-link" target="_blank" rel="noopener"></a></p></div>
    <div class="field"><label>Ledger</label><p id="result-ledger" class="mono"></p></div>
  </section>
</main>
<script>
  const $ = (id) => document.getElementById(id);
  let wallet = null;

  async function post(url, body) {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    let json;
    try { json = await response.json(); } catch { json = { error: response.statusText || "request failed" }; }
    if (!response.ok) throw new Error(json.error || "request failed");
    return json;
  }

  // Success hides the button for good: a re-click on camera would provision a
  // second wallet or submit a second real deposit. Only an error restores it.
  async function run(button, errorId, pendingLabel, action) {
    $(errorId).textContent = "";
    const idleLabel = button.textContent;
    button.disabled = true;
    button.textContent = pendingLabel;
    try {
      await action();
      button.classList.add("hidden");
    } catch (error) {
      $(errorId).textContent = error.message;
      button.disabled = false;
      button.textContent = idleLabel;
    }
  }

  $("btn-onboard").addEventListener("click", () => run($("btn-onboard"), "error-onboard", "Creating…", async () => {
    wallet = await post("/api/onboard", { email: $("email").value.trim() });
    $("wallet-address").textContent = wallet.address;
    $("step-wallet").classList.remove("hidden");
  }));

  $("btn-deposit").addEventListener("click", () => run($("btn-deposit"), "error-deposit", "Submitting…", async () => {
    const result = await post("/api/deposit", { walletId: wallet.walletId, address: wallet.address });
    const badge = $("result-badge");
    badge.textContent = result.successful ? "Deposit confirmed" : "Transaction failed";
    badge.className = "badge " + (result.successful ? "ok" : "ko");
    $("result-link").textContent = result.txHash;
    $("result-link").href = result.explorerUrl;
    $("result-ledger").textContent = result.ledger;
    $("step-result").classList.remove("hidden");
  }));
</script>
</body>
</html>
