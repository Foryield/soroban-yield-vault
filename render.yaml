# Render Blueprint - demo statique ForYield x Stellar (testnet, jetable)
# Deploiement : Render -> New -> Blueprint -> pointer ce repo.
# La UI Next.js (dossier web/) est exportee en statique : pas de serveur,
# pas de cold start, free tier toujours en ligne.
services:
  - type: web
    name: foryield-stellar-demo
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: out
    pullRequestPreviewsEnabled: false
    # Valeurs publiques (contract ID testnet + endpoints), aucun secret.
    # Actif du vault : XLM natif (tout compte finance par Friendbot peut deposer).
    envVars:
      - key: NEXT_PUBLIC_VAULT_ID
        value: CCKW7NFKDCOTOVUODLJ6K734ZEYT4TZLQGLIVFZZR6DLUHO6UOTENWQ6
      - key: NEXT_PUBLIC_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: NEXT_PUBLIC_HORIZON_URL
        value: https://horizon-testnet.stellar.org
